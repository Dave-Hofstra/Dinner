<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HG Dinner Club - Reservations</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="favicon-16x16.png" sizes="16x16">
  <link rel="icon" type="image/png" href="favicon-32x32.png" sizes="32x32">
  <link rel="icon" type="image/png" href="favicon-48x48.png" sizes="48x48">
  <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96">
  <link rel="apple-touch-icon" href="apple-touch-icon.png" sizes="180x180">
  <link rel="manifest" href="site.webmanifest">
  <meta name="msapplication-TileImage" content="mstile-150x150.png">
  <meta name="msapplication-TileColor" content="#212b31">
  <meta name="theme-color" content="#212b31">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <div class="header-left-top">
          <button class="home-btn" id="homeBtn" title="Go to Home">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
              <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
          </button>
          <div class="header-refresh-group">
            <button class="refresh-btn" id="refreshBtn" title="Refresh data">
              <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"></polyline>
                <polyline points="1 20 1 14 7 14"></polyline>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
              </svg>
            </button>
            <div class="countdown-timer" id="countdownTimer">59s</div>
          </div>
        </div>
        <div class="header-admin-row">
          <button class="admin-btn" id="adminBtn" title="Admin Mode">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
          </button>
        </div>
      </div>

      <div class="total-badge" id="totalBadge">
        <span class="badge-label">Total</span>
        <span class="badge-number" id="badgeCount">0</span>
      </div>
      <div class="calendar-badge" id="calendarBadge">
        <div class="cal-month" id="calMonth">MAY</div>
        <div class="cal-day" id="calDay">7</div>
      </div>
      <h1><span class="title-line1">HG Dinner Club</span><span class="title-line2">Reservations</span><span class="title-line3" id="titleDate">For: Loading...</span></h1>
      <p class="reset-note" id="resetNote"></p>
    </header>

    <!-- Admin toolbar - now OUTSIDE the header, between header and main -->
    <div class="admin-toolbar" id="adminToolbar" style="display:none;">
      <button class="admin-tool-btn" id="lockBtn" title="Lock/Unlock Reservations">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        <span class="admin-tool-label">Lock Reservations</span>
      </button>
      <button class="admin-tool-btn no-dinner-btn" id="noDinnerBtn" title="Cancel Dinner">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"></line>
        </svg>
        <span class="admin-tool-label">Cancel Dinner</span>
      </button>
      <button class="admin-tool-btn" id="addFamilyBtn" title="Add Attendee Card">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="7" r="3"></circle>
          <path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"></path>
          <path d="M16 3h5v5"></path>
          <path d="M21 3l-6 6"></path>
        </svg>
        <span class="admin-tool-label">Add Attendee</span>
      </button>
    </div>

    <main>
      <!-- Add Family Modal -->
      <div class="modal-overlay" id="addFamilyModal">
        <div class="modal-content">
          <h3>Add Attendee Card</h3>
          <div class="modal-field">
            <label for="newFamilyName">Name:</label>
            <input type="text" id="newFamilyName" placeholder="e.g. John & Jane" />
          </div>
          <div class="modal-field">
            <label for="newFamilyCount">Default # Attending:</label>
            <select id="newFamilyCount">
              <option value="1">1</option>
              <option value="2" selected>2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6</option>
            </select>
          </div>
          <div class="modal-buttons">
            <button class="modal-btn modal-cancel" id="modalCancelBtn">Cancel</button>
            <button class="modal-btn modal-confirm" id="modalConfirmBtn">Add Card</button>
          </div>
        </div>
      </div>

      <div class="cards-container" id="cardsContainer">
        <!-- Family cards will be inserted here by JavaScript -->
      </div>

      <div class="overlay-card" id="overlayCard">
        <div class="overlay-card-content">
          <div class="overlay-card-header">
            <span class="overlay-card-title" id="overlayCardTitle"></span>
            <button class="overlay-close-btn" id="overlayCloseBtn">&times;</button>
          </div>
          <textarea class="overlay-message-input" id="overlayMessageInput" placeholder="Custom message..."></textarea>
        </div>
      </div>

      <div class="total-section" id="totalSection">
        <h2>Total Attending: <span id="totalCount">0</span></h2>
      </div>

      <!-- Inactive Users Section -->
      <div class="inactive-section" id="inactiveSection" style="display:none;">
        <h3 class="inactive-heading">Inactive Users</h3>
        <div class="inactive-cards-container" id="inactiveCardsContainer">
          <!-- Inactive cards go here -->
        </div>
      </div>

      <div class="version-footer" id="versionFooter"></div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
